seed: 2026
class_count: 12

training:
  folds: 10
  validation_fraction: 0.15
  early_stopping_rounds: 50
  max_rows_per_fold: null

weights:
  rho: 0.9995
  cap: 8.0
  boundary_weight: 1.2
  interior_weight: 0.7
  confidence_map:
    1: 1.0
    2: 0.8
    3: 0.6

models:
  lightgbm:
    enabled: true
    params:
      objective: multiclass
      metric: multi_logloss
      num_class: 12
      learning_rate: 0.06
      num_leaves: 96
      feature_fraction: 0.80
      bagging_fraction: 0.80
      bagging_freq: 1
      min_data_in_leaf: 120
      max_bin: 255
      num_boost_round: 450
      num_threads: -1
      verbosity: -1
  xgboost:
    enabled: true
    max_train_rows: 750000
    params:
      objective: multi:softprob
      eval_metric: mlogloss
      num_class: 12
      eta: 0.06
      max_depth: 7
      subsample: 0.80
      colsample_bytree: 0.80
      min_child_weight: 5
      num_boost_round: 350
      tree_method: hist
      nthread: -1
  catboost:
    enabled: true
    max_train_rows: 300000
    params:
      loss_function: MultiClass
      classes_count: 12
      iterations: 220
      learning_rate: 0.08
      depth: 6
      l2_leaf_reg: 5
      verbose: 50
      thread_count: 64

ensemble:
  alpha:
    lightgbm: 1.0
    xgboost: 0.8
    catboost: 0.8

decode:
  tau_grid: [0.0, 0.05, 0.1, 0.15, 0.2, 0.3]
  beta_grid: [0.0, 0.1, 0.2, 0.35, 0.5, 0.8]
  decode_order_grid: [bayes_only, risk_viterbi, bayes_then_viterbi, viterbi_then_bayes]
  tail_gamma_grid: [0.0, 0.25, 0.5, 0.8, 1.2]
  tail_threshold_grid: [0.25, 0.35, 0.5, 0.65]
  lambda_grid: [1.0]
  tail_min_transition: 1.0e-4
  tail_gamma: 0.5
  tail_threshold: 0.5
